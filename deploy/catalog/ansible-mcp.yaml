apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-ansible-mcp
  namespace: mcp-catalog
  labels:
    mcp.x-k8s.io/catalog-entry: "true"
data:
  server.json: |
    {
      "name": "ansible-mcp-server",
      "description": "Interact with Ansible Automation Platform (AAP) via MCP",
      "image": "registry.redhat.io/ansible-automation-platform-25/aap-mcp-server-rhel9:latest",
      "defaultPort": 3000,
      "transport": "streamable-http",
      "credentials": [
        {
          "type": "env",
          "envName": "AAP_URL",
          "label": "AAP Base URL",
          "placeholder": "https://aap.example.com",
          "required": true,
          "sensitive": false
        },
        {
          "type": "env",
          "envName": "AAP_OAUTH_TOKEN",
          "label": "OAuth2 Bearer Token",
          "description": "Validated against {base-url}/api/gateway/v1/me/",
          "required": true,
          "sensitive": true
        }
      ]
    }
