apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-insights-mcp
  namespace: mcp-catalog
  labels:
    mcp.x-k8s.io/catalog-entry: "true"
data:
  server.json: |
    {
      "name": "insights-mcp-server",
      "description": "Red Hat Insights and Lightspeed integration via MCP",
      "image": "ghcr.io/redhatinsights/red-hat-lightspeed-mcp:latest",
      "defaultPort": 8000,
      "transport": "streamable-http",
      "credentials": [
        {
          "type": "env",
          "envName": "LIGHTSPEED_CLIENT_ID",
          "label": "Service Account Client ID",
          "description": "Create at console.redhat.com",
          "required": true,
          "sensitive": true
        },
        {
          "type": "env",
          "envName": "LIGHTSPEED_CLIENT_SECRET",
          "label": "Service Account Client Secret",
          "required": true,
          "sensitive": true
        }
      ],
      "args": ["http"]
    }
