{{ define "running-list" }}
{{ if not .Servers }}
<div class="card empty-state">
  <p>No MCP servers running.</p>
  <p><a href="/">Launch one from the catalog</a></p>
</div>
{{ else }}
<div class="server-table">
{{ range .Servers }}
  <div class="server-row">
    <span class="name">{{ .Name }}</span>
    <span><span class="badge">{{ .Namespace }}</span></span>
    <span><span class="status status-{{ .Phase }}">{{ .Phase }}</span></span>
    <span class="image" title="{{ .Image }}">{{ .Image }}</span>
    <span class="endpoint">{{ if .Endpoint }}{{ .Endpoint }}{{ end }}</span>
    <span class="actions">
      <button class="btn btn-outline btn-sm"{{ if not .Endpoint }} disabled style="visibility:hidden"{{ else }}
              onclick="navigator.clipboard.writeText('{{ .Endpoint }}'); this.textContent='Copied!'; setTimeout(()=>this.textContent='Copy URL',1500)"{{ end }}>
        Copy URL
      </button>
      <button class="btn btn-danger btn-sm"
              hx-delete="/server/{{ .Namespace }}/{{ .Name }}"
              hx-confirm="Delete {{ .Name }}?"
              hx-target="closest .server-row"
              hx-swap="outerHTML">
        Delete
      </button>
    </span>
  </div>
{{ end }}
</div>
{{ end }}
{{ end }}
