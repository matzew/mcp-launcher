{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Server Launcher</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .navbar {
      background: #1a1a2e;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar h1 { font-size: 1.25rem; font-weight: 600; }
    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      margin-left: 1.5rem;
      padding: 0.25rem 0;
    }
    .nav-links a:hover { color: white; }
    .nav-links a.active { color: white; border-bottom: 2px solid #3b82f6; }
    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 1.5rem;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { margin-bottom: 0.5rem; font-size: 1rem; }
    .card p {
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    /* Badges */
    .badge {
      display: inline-block;
      background: #f1f5f9;
      color: #475569;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-right: 0.25rem;
      margin-bottom: 0.5rem;
    }
    .badge-green { background: #dcfce7; color: #166534; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      text-decoration: none;
      font-family: inherit;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-outline { background: white; border: 1px solid #d1d5db; color: #374151; }
    .btn-outline:hover { background: #f9fafb; }
    .btn-sm { padding: 0.25rem 0.75rem; font-size: 0.8rem; }

    /* Forms */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.375rem;
      font-size: 0.875rem;
    }
    .form-group .hint {
      color: #64748b;
      font-size: 0.8rem;
      margin-bottom: 0.375rem;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
    }
    .form-group textarea {
      min-height: 100px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    /* Section headers */
    .section-header {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.375rem;
      border-bottom: 1px solid #e2e8f0;
    }

    /* YAML preview */
    .yaml-preview {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      position: sticky;
      top: 1rem;
    }
    .yaml-preview pre { margin: 0; }
    .yaml-preview code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      white-space: pre;
    }

    /* Running servers */
    .server-row {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .server-row .name { font-weight: 600; min-width: 180px; }
    .server-row .image {
      color: #64748b;
      font-size: 0.8rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 150px;
    }
    .server-row .endpoint {
      font-family: monospace;
      font-size: 0.8rem;
      color: #059669;
    }
    .status {
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .status-Running { background: #dcfce7; color: #166534; }
    .status-Pending { background: #fef9c3; color: #854d0e; }
    .status-Failed { background: #fecaca; color: #991b1b; }

    /* Misc */
    .actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h2 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .page-header p { color: #64748b; font-size: 0.875rem; }
    .back-link { color: #2563eb; text-decoration: none; font-size: 0.875rem; }
    .back-link:hover { text-decoration: underline; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
    }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }
    .empty-state a { color: #2563eb; }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>MCP Server Launcher</h1>
    <div class="nav-links">
      <a href="/"{{ if eq .ActivePage "catalog" }} class="active"{{ end }}>Catalog</a>
      <a href="/running"{{ if eq .ActivePage "running" }} class="active"{{ end }}>Running</a>
    </div>
  </nav>
  <div class="container">
    {{ template "content" . }}
  </div>
</body>
</html>
{{ end }}
