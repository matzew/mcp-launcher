version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - bodyclose

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Sscanf
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - appendAssign
        - commentFormatting

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
    paths:
      - vendor

formatters:
  enable:
    - gofmt
